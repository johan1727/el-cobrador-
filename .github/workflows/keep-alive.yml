name: Keep Alive - Daily Ping

on:
  schedule:
    # Run every day at 9:00 AM UTC (3:00 AM CST / 4:00 AM CDT)
    - cron: '0 9 * * *'
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel App
        run: |
          echo "Pinging https://el-cobrador.vercel.app/..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://el-cobrador.vercel.app/)
          echo "Response code: $response"
          if [ "$response" = "200" ]; then
            echo "✅ App is awake and responding!"
          else
            echo "⚠️ App responded with status $response"
          fi

      - name: Health Check - API Endpoint
        run: |
          # Optional: Add a specific health check endpoint if you have one
          # For now, just verify the main page loads
          echo "Running health check..."
          curl -s --max-time 30 https://el-cobrador.vercel.app/ | head -c 1000
          echo ""
          echo "Health check complete"

      - name: Notify on Failure (optional)
        if: failure()
        run: |
          echo "❌ Keep-alive ping failed at $(date)"
          echo "The app may be down or Vercel has put it to sleep."
